<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f5f0e8">
<title>Reset password — Board Vault</title>
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #ffffff;
    --text: #2a2018;
    --muted: #7a6f5f;
    --primary: #c9a227;
    --success: #4f7a28;
    --danger: #b03020;
    --border: #d9cdb6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 20px;
  }
  .card {
    background: var(--surface);
    max-width: 420px;
    width: 100%;
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 32px 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.04);
  }
  h1 {
    font-size: 22px;
    margin: 0 0 8px;
    letter-spacing: 0.5px;
  }
  p.sub {
    color: var(--muted);
    margin: 0 0 24px;
    font-size: 15px;
    line-height: 1.4;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin: 16px 0 6px;
  }
  input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  input[type="password"]:focus {
    border-color: var(--primary);
  }
  button {
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    background: var(--primary);
    color: var(--surface);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .msg {
    margin-top: 16px;
    font-size: 14px;
    line-height: 1.4;
    padding: 12px;
    border-radius: 8px;
  }
  .msg.ok {
    color: var(--success);
    background: rgba(79, 122, 40, 0.1);
  }
  .msg.err {
    color: var(--danger);
    background: rgba(176, 48, 32, 0.08);
  }
  .footer {
    text-align: center;
    margin-top: 24px;
    color: var(--muted);
    font-size: 13px;
  }
  .footer a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Reset your password</h1>
  <p class="sub">Pick a new password for your Board Vault account. After saving, open Board Vault and sign in with the new password.</p>

  <form id="resetForm" autocomplete="off">
    <label for="password">New password</label>
    <input id="password" name="password" type="password" minlength="8" required autocomplete="new-password" placeholder="At least 8 characters">

    <label for="confirm">Confirm</label>
    <input id="confirm" name="confirm" type="password" minlength="8" required autocomplete="new-password" placeholder="Type it again">

    <button id="submit" type="submit">Save new password</button>
  </form>

  <div id="msg"></div>

  <p class="footer">
    Trouble? <a href="mailto:support@boardvault.app">Email support</a>
  </p>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  // These are public values (anon key + project URL) and are safe to
  // ship in client-side code.
  const SUPABASE_URL = 'https://rsobkqcqmtcuriuwpgto.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzb2JrcWNxbXRjdXJpdXdwZ3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjUyNjMsImV4cCI6MjA5MzIwMTI2M30.u8jafKf8-D6-dww8H_IfftnikO2fmOKWDMbRXL0Y0tQ'

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      detectSessionInUrl: true,
      flowType: 'implicit',
    }
  })

  const msgEl = document.getElementById('msg')
  const btn = document.getElementById('submit')
  const form = document.getElementById('resetForm')

  function showError(text) {
    msgEl.textContent = text
    msgEl.className = 'msg err'
  }

  function showOk(text) {
    msgEl.textContent = text
    msgEl.className = 'msg ok'
  }

  // Supabase JS automatically processes the recovery token in the URL
  // hash on load. If there's no valid token (link expired or tampered
  // with), updateUser will fail and we surface the error.
  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    msgEl.textContent = ''
    msgEl.className = 'msg'

    const password = document.getElementById('password').value
    const confirm = document.getElementById('confirm').value

    if (password.length < 8) {
      showError('Password must be at least 8 characters.')
      return
    }
    if (password !== confirm) {
      showError("Passwords don't match.")
      return
    }

    btn.disabled = true
    btn.textContent = 'Saving…'

    const { error } = await supabase.auth.updateUser({ password })

    btn.disabled = false
    btn.textContent = 'Save new password'

    if (error) {
      if (/expired|invalid/i.test(error.message)) {
        showError('This reset link has expired or already been used. Open Board Vault and request a new one.')
      } else {
        showError(error.message || 'Could not update password.')
      }
      return
    }

    form.style.display = 'none'
    showOk("Password updated! Open Board Vault and sign in with your new password.")
  })
</script>
</body>
</html>
